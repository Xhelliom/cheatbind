name: Release → PyPI + AUR

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # OIDC trusted publisher
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  aur:
    name: Update AUR package
    runs-on: ubuntu-latest
    needs: pypi
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Setup SSH for AUR
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts
          cat >> ~/.ssh/config << 'EOF'
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur
            User aur
          EOF

      - name: Clone AUR repo and update
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          git clone ssh://aur@aur.archlinux.org/cheatbind.git /tmp/aur-cheatbind
          cp PKGBUILD /tmp/aur-cheatbind/

          cd /tmp/aur-cheatbind
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD

          # Generate .SRCINFO in a temp dir to avoid Docker permission issues on .git/
          mkdir -p /tmp/srcinfo-build
          cp PKGBUILD /tmp/srcinfo-build/
          docker run --rm -v "/tmp/srcinfo-build:/pkg" archlinux:latest bash -c "
            pacman -Sy --noconfirm base-devel &&
            useradd -m builder &&
            chown -R builder:builder /pkg &&
            cd /pkg &&
            su builder -c 'makepkg --printsrcinfo > .SRCINFO'
          "
          cp /tmp/srcinfo-build/.SRCINFO .

          git config user.name "Stephane Wetterwald"
          git config user.email "stephane.wetterwald@gmail.com"
          git add PKGBUILD .SRCINFO
          git diff --cached --quiet || git commit -m "Update to ${VERSION}"
          git push origin master
